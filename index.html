<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <div class="bg-indigo-700 text-white pt-10 pb-16 px-6 rounded-b-[3rem] shadow-2xl">
        <div class="max-w-md mx-auto text-center">
            <h1 class="text-sm opacity-80 uppercase tracking-widest mb-2">ยอดเงินคงเหลือสุทธิ</h1>
            <h2 id="total-balance" class="text-5xl font-bold mb-6">฿ 0.00</h2>
            
            <div class="grid grid-cols-2 gap-4 bg-white/10 p-4 rounded-3xl backdrop-blur-md">
                <div class="border-r border-white/20">
                    <p class="text-xs opacity-70">เงินต้น</p>
                    <p id="display-initial" class="text-lg font-semibold">฿ 0</p>
                </div>
                <div>
                    <p class="text-xs opacity-70">กำไร/ขาดทุน</p>
                    <p id="display-net" class="text-lg font-semibold text-emerald-300">฿ 0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 -mt-8">
        <div class="bg-white p-6 rounded-3xl shadow-xl mb-6 animate-in">
            <div class="space-y-3">
                <input type="text" id="desc-input" placeholder="รายการ (เช่น ค่าเน็ต, ของเล่น)" 
                    class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <input type="number" id="amount-input" placeholder="จำนวนเงิน" 
                    class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="addRecord('income')" class="bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-emerald-100 active:scale-95 transition">
                        <i class="fas fa-plus-circle mr-1"></i> รายรับ
                    </button>
                    <button onclick="addRecord('expense')" class="bg-rose-500 hover:bg-rose-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-rose-100 active:scale-95 transition">
                        <i class="fas fa-minus-circle mr-1"></i> รายจ่าย
                    </button>
                </div>
            </div>
        </div>

        <div id="setup-section" class="mb-6 px-2">
            <button onclick="toggleSetup()" class="text-xs text-indigo-600 font-bold bg-indigo-50 px-4 py-2 rounded-full hover:bg-indigo-100">
                <i class="fas fa-cog mr-1"></i> ตั้งค่าเงินต้นใหม่
            </button>
            <div id="setup-box" class="hidden mt-3 p-4 bg-white rounded-2xl shadow-md border border-indigo-100">
                <p class="text-xs text-gray-500 mb-2">ระบุจำนวนเงินที่มีอยู่จริงในบัญชีปัจจุบัน</p>
                <div class="flex gap-2">
                    <input type="number" id="initial-input" class="flex-1 p-2 bg-gray-50 rounded-xl outline-none border border-gray-100">
                    <button onclick="updateInitial()" class="bg-indigo-600 text-white px-4 rounded-xl text-sm font-bold">บันทึก</button>
                </div>
            </div>
        </div>

        <h3 class="font-bold text-gray-700 mb-4 px-2 flex justify-between">
            <span>ประวัติรายการ</span>
            <span id="record-count" class="text-xs font-normal text-gray-400">0 รายการ</span>
        </h3>
        <div id="history-list" class="space-y-3">
            <div class="text-center py-10 text-gray-400 text-sm">กำลังโหลดข้อมูลจาก Cloud...</div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 flex justify-around items-center shadow-2xl">
        <button class="text-indigo-600"><i class="fas fa-home text-xl"></i></button>
        <button class="text-gray-400"><i class="fas fa-chart-line text-xl"></i></button>
        <button onclick="location.reload()" class="text-gray-400"><i class="fas fa-sync-alt text-xl"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- ⚠️ วาง Config ของคุณจากรูปสุดท้ายที่นี่ ⚠️ ---
        const firebaseConfig = {
  apiKey: "AIzaSyANzxX65qqpLWnyl_nk7dORQQDRXK25CD8",
  authDomain: "puim-f05ea.firebaseapp.com",
  projectId: "puim-f05ea",
  storageBucket: "puim-f05ea.firebasestorage.app",
  messagingSenderId: "773999792990",
  appId: "1:773999792990:web:bb24c283744adf539635cf",
  measurementId: "G-LE2ZM330V2"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userDoc = doc(db, "settings", "main_config");
        const transCol = collection(db, "transactions");

        // 1. ดึงเงินต้น (Real-time)
        onSnapshot(userDoc, (doc) => {
            if (doc.exists()) {
                window.initialBalance = doc.data().initial || 0;
                document.getElementById('display-initial').innerText = `฿ ${window.initialBalance.toLocaleString()}`;
                calculateTotal();
            }
        });

        // 2. ดึงประวัติรายการ (Real-time)
        const q = query(transCol, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            let net = 0;
            let count = 0;

            snapshot.forEach((doc) => {
                const r = doc.data();
                const id = doc.id;
                net += r.amount;
                count++;
                const isExp = r.amount < 0;
                const dateStr = r.timestamp ? new Date(r.timestamp.toDate()).toLocaleString('th-TH', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'short'}) : 'กำลังบันทึก...';

                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border-l-4 ${isExp ? 'border-rose-400' : 'border-emerald-400'} animate-in group">
                        <div onclick="deleteItem('${id}')" class="cursor-pointer">
                            <p class="font-semibold text-gray-800">${r.text}</p>
                            <p class="text-[10px] text-gray-400">${dateStr}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold ${isExp ? 'text-rose-500' : 'text-emerald-500'}">
                                ${isExp ? '-' : '+'}${Math.abs(r.amount).toLocaleString()}
                            </p>
                        </div>
                    </div>`;
            });

            window.netAmount = net;
            document.getElementById('display-net').innerText = `฿ ${net.toLocaleString()}`;
            document.getElementById('display-net').className = `text-lg font-semibold ${net >= 0 ? 'text-emerald-300' : 'text-rose-300'}`;
            document.getElementById('record-count').innerText = `${count} รายการ`;
            calculateTotal();
        });

        // Functions
        window.updateInitial = async () => {
            const val = document.getElementById('initial-input').value;
            if(!val) return;
            await setDoc(userDoc, { initial: parseFloat(val) });
            document.getElementById('setup-box').classList.add('hidden');
        };

        window.addRecord = async (type) => {
            const desc = document.getElementById('desc-input').value;
            const amt = document.getElementById('amount-input').value;
            if(!desc || !amt) return alert("กรุณากรอกข้อมูลให้ครบครับ");
            
            await addDoc(transCol, {
                text: desc,
                amount: type === 'expense' ? -Math.abs(amt) : Math.abs(amt),
                timestamp: serverTimestamp()
            });
            document.getElementById('desc-input').value = '';
            document.getElementById('amount-input').value = '';
        };

        window.deleteItem = async (id) => {
            if(confirm("ต้องการลบรายการนี้ใช่ไหม?")) {
                await deleteDoc(doc(db, "transactions", id));
            }
        };

        function calculateTotal() {
            const total = (window.initialBalance || 0) + (window.netAmount || 0);
            document.getElementById('total-balance').innerText = `฿ ${total.toLocaleString()}`;
        }

        window.toggleSetup = () => document.getElementById('setup-box').classList.toggle('hidden');
    </script>
</body>
</html>
